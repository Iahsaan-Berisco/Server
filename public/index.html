<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<title>GameZone Manager</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="shortcut icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="/socket.io/socket.io.js"></script>
<style>
/* [All CSS remains the same - including modal styles] */
:root {
--bg: #0f0f0f;--s1: #171717;--s2: #1e1e1e;--s3: #272727;--s4: #303030;
--green: #10b981;--green-bg: rgba(16,185,129,.1);--green-bd: rgba(16,185,129,.3);
--red: #ef4444;--red-bg: rgba(239,68,68,.1);--red-bd: rgba(239,68,68,.3);
--amber: #f59e0b;--amber-bg: rgba(245,158,11,.1);--amber-bd: rgba(245,158,11,.3);
--blue: #3b82f6;--blue-bg: rgba(59,130,246,.1);--blue-bd: rgba(59,130,246,.3);
--t1: #fafafa;--t2: #a3a3a3;--t3: #525252;
--bd: rgba(255,255,255,.07);--bd2: rgba(255,255,255,.12);
--r: 10px;--r2: 14px;--r3: 20px;
--sans: 'Inter', sans-serif;--mono: 'JetBrains Mono', monospace;
--sidebar: 300px;--nav-h: 60px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--sans);overflow:hidden}
*{-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none}
.mono-block,#s-id,input,textarea{-webkit-user-select:text!important;-moz-user-select:text!important;-ms-user-select:text!important;user-select:text!important}
#app{height:100dvh;position:relative;overflow:hidden}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);opacity:0;pointer-events:none;transform:translateY(10px);transition:opacity .22s ease,transform .22s ease;z-index:10;overflow:hidden}
.screen.active{opacity:1;pointer-events:all;transform:none;z-index:20}
@media(min-width:1024px){
#app{display:grid;grid-template-columns:var(--sidebar) 1fr;grid-template-rows:1fr;overflow:hidden}
.screen{position:relative!important;inset:auto!important;opacity:1!important;transform:none!important;pointer-events:all!important;transition:none!important;z-index:auto!important;display:none;height:100dvh;overflow:hidden}
.screen.active{display:flex}
#screen-login{position:fixed!important;inset:0!important;z-index:200!important;display:none;justify-content:center;align-items:center}
#screen-login.active{display:flex}
#screen-groups{grid-column:1;grid-row:1;display:flex!important;border-right:1px solid var(--bd);background:var(--s1)}
#screen-groups .mobile-topbar{display:none}
#screen-dashboard,#screen-pccontrol,#screen-settings{grid-column:2;grid-row:1}
.sidebar-header{display:flex!important}
.screen-pad{padding:28px 32px}
.pc-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;padding:0 32px 32px}
.action-grid{padding:0 32px}
.stats-row{padding:24px 32px 20px}
.topbar{padding:0 32px}
.scroll-inner{max-width:860px;margin:0 auto}
.desktop-only{display:flex!important}
}
.desktop-only{display:none!important}
/* [Rest of CSS remains same] */

/* ✅ Custom Confirmation Modal Styles */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease;
}
.modal-overlay.active {
    opacity: 1;
    pointer-events: all;
}
.modal {
    background: var(--s1);
    border: 1px solid var(--bd2);
    border-radius: var(--r3);
    padding: 24px;
    max-width: 400px;
    width: calc(100% - 40px);
    text-align: center;
    box-shadow: 0 24px 64px rgba(0,0,0,.5);
}
.modal-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 12px;
    color: var(--t1);
}
.modal-message {
    font-size: 13px;
    color: var(--t2);
    margin-bottom: 20px;
    line-height: 1.4;
    white-space: pre-line;
}
.modal-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
}
.modal-btn {
    padding: 10px 20px;
    border-radius: var(--r);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    font-family: var(--sans);
    transition: all .15s;
}
.modal-btn.cancel {
    background: var(--s3);
    color: var(--t1);
}
.modal-btn.cancel:hover {
    background: var(--s4);
}
.modal-btn.confirm {
    background: var(--red);
    color: #fff;
}
.modal-btn.confirm:hover {
    background: #dc2626;
}
.modal-btn.confirm.sleep {
    background: var(--blue);
}
.modal-btn.confirm.sleep:hover {
    background: #2563eb;
}
</style>
</head>
<body>
<div id="app">
<!-- [Login, Groups, Dashboard screens remain same] -->

<div class="screen" id="screen-pccontrol">
<div class="topbar">
<button class="back-btn" onclick="goBack('dashboard')"><i class="fa-solid fa-chevron-left"></i></button>
<div class="topbar-title" id="pc-title">PC</div>
<div id="pc-pill" class="status-pill"></div>
</div>
<div class="scroll-area">
<div class="scroll-inner">
<div style="height:16px"></div>
<div id="pc-timer-area"></div>
<div class="section-head">Screen Control</div>
<div class="action-grid" style="margin-bottom:20px">
<div class="action-card" onclick="pcCmd('lock')"><div class="action-card-icon"><i class="fa-solid fa-lock" style="color:var(--amber)"></i></div><div class="action-card-label">Lock</div></div>
<div class="action-card" onclick="pcCmd('unlock')"><div class="action-card-icon"><i class="fa-solid fa-lock-open" style="color:var(--green)"></i></div><div class="action-card-label">Unlock</div></div>
<!-- ✅ FIXED: Removed desktop-only class - visible on ALL devices -->
<div class="action-card" onclick="confirmAction('sleep')" id="btn-sleep"><div class="action-card-icon"><i class="fa-solid fa-moon" style="color:var(--blue)"></i></div><div class="action-card-label">Sleep</div></div>
<div class="action-card" onclick="confirmAction('shutdown')" id="btn-shutdown"><div class="action-card-icon"><i class="fa-solid fa-power-off" style="color:var(--red)"></i></div><div class="action-card-label">Shutdown</div></div>
</div>
<!-- [Rest of PC Control screen remains same] -->
</div>
</div>
</div>

<!-- [Settings, Sheets, Modal remain same] -->

<!-- ✅ Custom Confirmation Modal -->
<div class="modal-overlay" id="confirm-modal">
<div class="modal">
<div class="modal-title" id="modal-title">Confirm Action</div>
<div class="modal-message" id="modal-message">Are you sure?</div>
<div class="modal-actions">
<button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
<button class="modal-btn confirm" id="modal-confirm-btn" onclick="executeAction()">Confirm</button>
</div>
</div>
</div>

<div class="toast" id="toast"></div>
</div>
<script>
const state = { token:null, user:null, serverUrl:null, groups:[], activeGroup:null, pcs:[], activePc:null, socket:null };
let currentScreen = 'login';
let _toastT;
let _freeTimerStart = 0;
let _freeTimerAdded = 0;
let _pendingAction = null;

window.addEventListener('load', () => {
state.token = localStorage.getItem('gz_token');
state.user = JSON.parse(localStorage.getItem('gz_user') || 'null');
state.serverUrl = localStorage.getItem('gz_server') || '';
// ✅ FIXED: Removed updatePowerButtons() from here
if (state.token && state.user) { showScreen('groups'); loadGroups(); checkExpiryWarning(); applyPrefs(); }
else { const s = localStorage.getItem('gz_server')||''; if(s) document.getElementById('login-server').value=s; }
setInterval(() => {
if (currentScreen==='dashboard') {
const now = Math.floor(Date.now()/1000);
document.querySelectorAll('.pc-timer').forEach((timerEl, idx) => {
const pc = state.pcs[idx];
if (pc) {
const left = pc.session_end>now ? pc.session_end-now : 0;
const isWatch = pc.stopwatch_start>0;
const elapsed = isWatch ? now-pc.stopwatch_start : 0;
timerEl.textContent = isWatch ? fmtTime(elapsed) : left>0 ? fmtTime(left) : '--:--';
}
});
}
if (currentScreen==='pccontrol') {
const pc = state.activePc;
if (pc) {
const now = Math.floor(Date.now()/1000);
const left = pc.session_end>now ? pc.session_end-now : 0;
const isWatch = pc.stopwatch_start>0;
const elapsed = isWatch ? now-pc.stopwatch_start : 0;
const timerBig = document.querySelector('.timer-big');
if (timerBig) timerBig.textContent = isWatch ? fmtTime(elapsed) : (left>0 ? fmtTime(left) : '--:--');
}
}
}, 1000);
});

// [All other functions remain same: showScreen, goBack, openSheet, closeSheet, api, switchTab, fetchWithTimeout]

async function doLogin() {
const server = document.getElementById('login-server').value.trim().replace(/\/$/,'');
const username = document.getElementById('login-user').value.trim();
const password = document.getElementById('login-pass').value;
if (!server||!username||!password) { toast('Fill all fields','err'); return; }
state.serverUrl = server;
const btn = document.getElementById('login-btn');
btn.disabled = true;
document.getElementById('login-btn-text').innerHTML = '<span class="spin"></span>';
try {
const res = await fetchWithTimeout(server+'/api/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})}, 15000);
const d = await res.json();
if (d.error) throw new Error(d.error);
saveAuth(server, d.token, d.user, d.status, d.expiry_date);
showScreen('groups'); loadGroups(); // ✅ FIXED: Removed updatePowerButtons()
if (d.status==='active') checkExpiryWarning();
toast('Signed in','ok');
} catch(e) {
if (e.name==='AbortError') toast('Connection timed out','err');
else toast(e.message||'Login failed','err');
} finally { btn.disabled=false; document.getElementById('login-btn-text').textContent='Sign In'; }
}

async function doRegister() {
const server = document.getElementById('reg-server').value.trim().replace(/\/$/,'');
const username = document.getElementById('reg-user').value.trim();
const password = document.getElementById('reg-pass').value;
if (!server||!username||!password) { toast('Fill all fields','err'); return; }
state.serverUrl = server;
const btn = document.getElementById('reg-btn');
btn.disabled = true;
document.getElementById('reg-btn-text').innerHTML = '<span class="spin"></span>';
try {
const res = await fetchWithTimeout(server+'/api/register', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})}, 15000);
const d = await res.json();
if (d.error) throw new Error(d.error);
saveAuth(server, d.token, d.user, d.status, d.expiry_date);
showScreen('groups'); loadGroups(); // ✅ FIXED: Removed updatePowerButtons()
toast('Account created — awaiting approval','ok');
} catch(e) {
if (e.name==='AbortError') toast('Connection timed out','err');
else toast(e.message||'Registration failed','err');
} finally { btn.disabled=false; document.getElementById('reg-btn-text').textContent='Create Account'; }
}

// [All other functions remain same: saveAuth, checkExpiryWarning, getPrefs, togglePref, applyPrefs, getGroupRate, saveGroupRate, loadGroupRate, doLogout, loadGroups, renderGroups, createGroup, openGroup, loadPCs, renderPCs, addPC]

function openPC(id) {
state.activePc = state.pcs.find(p=>p.id===id);
document.getElementById('pc-title').textContent = state.activePc.name;
updateOnlinePill(); renderPCActions(); showScreen('pccontrol');
updatePowerButtons(); // ✅ Keep this - buttons exist now
}

// [updateOnlinePill, renderPCActions, togglePay, startSession, startSessionByAmount, startCustomSession, startStopwatch, addTime, addTimeByAmount, addCustomTime, removeTime, removeCustomTime, confirmEndSession, pcCmd, updatePcField, openApps, openKillSheet, killAllProcesses, killProcess, launchApp, loadAdmins, addAdmin, removeAdmin, loadDeletePCList, loadReorderPCList, reorderPC, deletePC, confirmDeleteGroup remain same]

// ✅ FIXED: Added try-catch for safety
function updatePowerButtons() {
try {
const sleepBtn = document.getElementById('btn-sleep');
const shutdownBtn = document.getElementById('btn-shutdown');
if (sleepBtn) sleepBtn.style.display = '';
if (shutdownBtn) shutdownBtn.style.display = '';
} catch(e) {
// Buttons don't exist yet - ignore
}
}

// [showModal, closeModal, executeAction, confirmAction remain same]

function connectSocket() {
if (state.socket) state.socket.disconnect();
state.socket = io(state.serverUrl, { transports: ['websocket'] });
state.socket.on('connect', () => {
state.socket.emit('admin:subscribe', { group_id: state.activeGroup.id, token: state.token });
updatePowerButtons(); // ✅ Keep this - called after socket connects
});
state.socket.on('group:'+state.activeGroup.id+':pc-status', ({ pc_id, is_online }) => {
const pc = state.pcs.find(p=>p.id===pc_id);
if (pc) {
pc.is_online = is_online ? 1 : 0;
renderPCs();
if (state.activePc?.id===pc_id) { state.activePc.is_online=pc.is_online; updateOnlinePill(); }
}
});
state.socket.on('group:'+state.activeGroup.id+':pc-session', (data) => {
const { pc_id } = data;
const pc = state.pcs.find(p=>p.id===pc_id);
if (pc) {
if ('session_end'     in data) pc.session_end     = data.session_end;
if ('stopwatch_start' in data) pc.stopwatch_start = data.stopwatch_start;
if ('payment_status'  in data) pc.payment_status  = data.payment_status;
renderPCs();
if (state.activePc?.id===pc_id) {
if ('session_end'     in data) state.activePc.session_end     = data.session_end;
if ('stopwatch_start' in data) state.activePc.stopwatch_start = data.stopwatch_start;
if ('payment_status'  in data) state.activePc.payment_status  = data.payment_status;
renderPCActions(); updateOnlinePill();
}
}
});
}

// [lhGet, lhSet, lhAdd, refreshHistory, fmtTime, toast remain same]
</script>
</body>
</html>
